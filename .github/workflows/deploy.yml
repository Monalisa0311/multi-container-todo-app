name: Deploy Todo applications

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to docker
        uses: docker/login-action@v3
        with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build docker image
        run: | 
          docker build -t ${{secrets.DOCKERHUB_USERNAME}}/todo-backend:latest ./backend

      - name: Push Docker image
        run : |
          docker push ${{secrets.DOCKERHUB_USERNAME}}/todo-backend:latest

      - name: setup terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ secrets.AWS_REGION }}

      - name: terraform init
        working-directory: terraform
        run: terraform init

      - name: terraform validate
        working-directory: terraform
        run: terraform validate

      - name: terraform apply
        working-directory: terraform
        run: | 
          terraform apply -auto-approve \
          -var="aws_region=${{ secrets.AWS_REGION }}" \
          -var="key_name=${{ secrets.EC2_KEY_NAME }}"

      - name: Get EC2 public IP
        working-directory: terraform
        run: |
          echo "EC2_IP=$(terraform output -raw public_ip)" >> $GITHUB_ENV

      - name: Create a SSH key
        run : |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Generate inventory file
        run: |
          cat > ansible/inventory.ini <<EOF
          [todo_server]
          ${{ env.EC2_IP }} ansible_user=${{ secrets.INSTANCE_USER }} ansible_ssh_private_key_file=private_key.pem
          EOF

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible 

      - name: Wait for SSH
        run: |
          until ssh -o StrictHostKeyChecking=no \
            -i private_key.pem \
            ${{ secrets.INSTANCE_USER }}@${{ env.EC2_IP }} "echo SSH Ready" >/dev/null 2>&1
          do
            echo "Waiting for EC2..."
            sleep 10
          done

      - name: Run Ansible Playbook
        run: | 
          ansible-playbook -i ansible/inventory.ini ansible/playbook.yml \
          --extra-vars "dockerhub_username=${{ secrets.DOCKERHUB_USERNAME }}"